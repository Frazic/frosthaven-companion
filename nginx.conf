# Port 80: health probe + redirect everything else to HTTPS.
server {
    listen       80;
    server_name  _;

    # Plain-HTTP health endpoint (container HEALTHCHECK hits this, no TLS).
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Everything else upgrades to HTTPS, preserving host (ip or .local) + path.
    location / {
        return 301 https://$host$request_uri;
    }
}

# Port 443: the actual app over TLS (self-signed cert).
server {
    listen       443 ssl;
    http2        on;
    server_name  _;

    ssl_certificate     /etc/nginx/certs/fh.crt;
    ssl_certificate_key /etc/nginx/certs/fh.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri /index.html;
    }
}
